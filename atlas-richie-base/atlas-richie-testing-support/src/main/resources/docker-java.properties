# docker-java 客户端 API 版本（classpath: docker-java.properties）
# Docker Engine 29+ 要求最低 API 1.44；Testcontainers 2.0.5 内置默认亦为 1.44。
# 此处显式声明，防止传递依赖中的旧版 docker-java 仍回落到 1.32 导致 BadRequest 400。
api.version=1.44
