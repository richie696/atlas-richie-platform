# Elasticsearch HTTP 请求日志配置
logging:
  level:
    # 显示 HTTP 请求和响应的具体内容
    org.apache.http.wire: DEBUG
    org.apache.http.headers: DEBUG

    # Spring Data Elasticsearch 内部日志
    org.springframework.data.elasticsearch.core.ElasticsearchTemplate: DEBUG
    org.springframework.data.elasticsearch.client.elc: DEBUG

    # Elasticsearch 客户端底层传输日志
    co.elastic.clients.transport.rest_client: DEBUG
    co.elastic.clients.elasticsearch._types: DEBUG

    # 显示生成的查询 DSL
    org.springframework.data.elasticsearch.core.query: DEBUG

