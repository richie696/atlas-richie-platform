# --- 切换 vendor 的步骤 ---
# 1. 替换 maven 依赖 (移除 aliyun 包, 引入新 vendor 包)
# 2. 改 platform.component.ocr.vendor: <新 vendor 名>
# 3. 替换 vendor 私有配置段 (aliyun: → baidu: / paddle: / ...)
# 4. 重启应用
