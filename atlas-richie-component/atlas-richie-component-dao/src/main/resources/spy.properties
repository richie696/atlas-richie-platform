modulelist=com.baomidou.mybatisplus.extension.p6spy.MybatisPlusLogFactory
# \u81EA\u5B9A\u4E49\u65E5\u5FD7\u6253\u5370
logMessageFormat=com.richie.component.dao.spy.OptimizeLineFormat
# \u65E5\u5FD7\u8F93\u51FA\u5230\u63A7\u5236\u53F0
appender=com.richie.component.dao.spy.DaoSlf4jLogger
## \u914D\u7F6E\u8BB0\u5F55 Log \u4F8B\u5916,\u53EF\u53BB\u6389\u7684\u7ED3\u679C\u96C6\u6709error,info,batch,debug,statement,commit,rollback,result,resultset.
excludecategories=info,debug,result,resultset,batch
# \u65E5\u671F\u683C\u5F0F
dateformat=yyyy-MM-dd HH:mm:ssZ
# \u662F\u5426\u5F00\u542F\u6162sql\u8BB0\u5F55
outagedetection=true
# \u6162sql\u8BB0\u5F55\u6807\u51C6 \u79D2
outagedetectioninterval=2
# \u81EA\u5B9A\u4E49\u65E5\u5FD7\u6D88\u606F\u683C\u5F0F
customLogMessageFormat=\n%(currentTime) | SQL\u8017\u65F6\uFF1A %(executionTime) ms | \u8FDE\u63A5\u4FE1\u606F\uFF1A %(category)-%(connectionId) | \u6267\u884C\u8BED\u53E5\uFF1A\n%(sql)
# \u9A71\u52A8\u5217\u8868
driverlist=com.mysql.cj.jdbc.Driver
