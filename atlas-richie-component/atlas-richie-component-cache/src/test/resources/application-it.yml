# 集测缓存配置
# Redis 连接信息（host/port/password/database）由 RedisIntegrationTestInitializer 通过 addFirst 注入
# Testcontainers 启动无密码的 redis:7-alpine；IT_USE_EXTERNAL=true 时读取 {CACHE}_IT_REDIS_* 环境变量
# 本文件只保留 Testcontainer 无法提供的组件专属属性
spring:
  data:
    redis:
      enable-l2-caching: false
      server-type: standalone
      client-name: cache-it-redis
      client-type: lettuce
      timeout: 2000ms
      connect-timeout: 5000ms
      ssl:
        enabled: false
      perf:
        enabled: true
        block-forbidden-tiers: true
        block-string-payload-violations: true
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 5000ms
    local:
      provider: CAFFEINE

platform:
  cache:
    cache-provider: REDIS
    bloom-filter:
      enable: false
