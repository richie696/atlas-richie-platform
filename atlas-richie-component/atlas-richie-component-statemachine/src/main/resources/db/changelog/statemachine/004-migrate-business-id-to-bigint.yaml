databaseChangeLog:
  - changeSet:
      id: statemachine-004-migrate-business-id-to-bigint
      author: statemachine
      changes:
        # 迁移 statemachine_state_current 表的 business_id 字段
        - modifyDataType:
            tableName: statemachine_state_current
            columnName: business_id
            newDataType: BIGINT
            remarks: 将 business_id 从 varchar(128) 改为 BIGINT，以支持与业务表的数值型主键直接关联查询，避免类型转换带来的性能损失
        
        # 迁移 statemachine_state_history 表的 business_id 字段
        - modifyDataType:
            tableName: statemachine_state_history
            columnName: business_id
            newDataType: BIGINT
            remarks: 将 business_id 从 varchar(128) 改为 BIGINT，以支持与业务表的数值型主键直接关联查询，避免类型转换带来的性能损失
