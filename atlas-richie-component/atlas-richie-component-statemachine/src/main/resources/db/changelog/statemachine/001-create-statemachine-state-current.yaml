databaseChangeLog:
  - changeSet:
      id: statemachine-001-create-current
      author: statemachine
      changes:
        - createTable:
            tableName: statemachine_state_current
            remarks: 状态机当前状态表，用于持久化状态机的当前状态到数据库
            columns:
              - column:
                  name: state_machine
                  type: varchar(128)
                  remarks: 状态机名称（如：payment、fulfillment、delivery），用于区分不同的状态机维度
                  constraints:
                    nullable: false
              - column:
                  name: business_id
                  type: BIGINT
                  remarks: 业务对象ID（如：订单ID），用于标识具体的业务对象。使用 BIGINT 类型以支持与业务表的数值型主键直接关联查询，避免类型转换带来的性能损失。
                  constraints:
                    nullable: false
              - column:
                  name: current_state
                  type: varchar(128)
                  remarks: 当前状态值（如：SUCCESS、PENDING、FAILED），表示该状态机当前的状态
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp
                  remarks: 更新时间，使用业务事件的发生时间（如：支付完成时间），而非系统当前时间
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: statemachine_state_current
            columnNames: state_machine, business_id
            constraintName: pk_statemachine_state_current


