platform:
  security:
      enable: true
      enable-stateful: false
      enable-stateless: true
      authentication:
           jwt:
              secret: my-secret-token-to-change-in-production
              tokenValidityInSeconds: 86400
      ignored-resources: #key-value pairs, key is the target resource uri, and value stands for httpmethod: GET, HEAD, POST, PUT, PATCH, DELETE, OPTIONS, TRACE
          -
              key: "/app/**/*.{js,html}" 
              value: "*"  
             
      authorizes: # List of AuthorizeExpression 
           -
              uri: "/test/hello" 
              authorizevia: "authenticated" 
           -
              uri: "/test/permitAll" 
              authorizevia: "permitAll" 
           -
              uri: "/test/role"
              authorizevia: "hasAnyAuthority"
              authorizeAttributes: "ROLE_ADMIN" 
              
      rememberMe: 
        key: remember-me