name: CI

on:
  push:
    branches:
      - master
      - main
      - '**/*-RELEASE'
  pull_request:
    branches:
      - master
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build with Maven
        run: >
          mvn -B clean verify
          -DskipTests
          -pl '!atlas-richie-component-template'
          -am
