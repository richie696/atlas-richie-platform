server:
    port: 8083

spring:
    application:
        name: sample-storage-cos
    main:
        allow-bean-definition-overriding: true
        allow-circular-references: false
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# 腾讯云COS存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: TENCENT_COS
                # COS访问域名（示例：cos.ap-guangzhou.myqcloud.com）
                endpoint: cos.ap-guangzhou.myqcloud.com
                # 区域
                region: ap-guangzhou
                # 访问密钥ID（SecretId）
                access-key-id: your-secret-id
                # 访问密钥（SecretKey）
                access-key-secret: your-secret-key
                # 存储桶名称
                bucket-name: richie-bucket-1234567890
                # 桶内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
