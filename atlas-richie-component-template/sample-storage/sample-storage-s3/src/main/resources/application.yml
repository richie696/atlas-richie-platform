server:
    port: 8085

spring:
    application:
        name: sample-storage-s3
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# AWS S3存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: AWS_S3
                # S3访问域名（示例：s3.amazonaws.com 或 s3.us-east-1.amazonaws.com）
                endpoint: s3.us-east-1.amazonaws.com
                # 区域
                region: us-east-1
                # 访问密钥ID（Access Key ID）
                access-key-id: your-access-key-id
                # 访问密钥（Secret Access Key）
                access-key-secret: your-secret-access-key
                # 存储桶名称
                bucket-name: richie-bucket
                # 桶内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
