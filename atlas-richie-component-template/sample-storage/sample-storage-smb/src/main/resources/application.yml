server:
    port: 8090

spring:
    application:
        name: sample-storage-smb
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# SMB存储配置
platform:
    component:
        storage:
            smb:
                # 是否启用SMB
                enable: true
                # SMB服务器地址（示例：smb://192.168.1.100/share）
                host: smb://192.168.1.100/share
                # 域名（可选，Windows网络环境可能需要）
                domain: WORKGROUP
                # 用户名
                username: smb-user
                # 密码
                password: smb-password
                # 基础路径
                base-path: /upload
                # 连接超时时间（毫秒）
                timeout: 30000

logging:
    level:
        com.richie: DEBUG
