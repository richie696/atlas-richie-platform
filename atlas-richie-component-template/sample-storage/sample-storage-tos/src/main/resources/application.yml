server:
    port: 8087

spring:
    application:
        name: sample-storage-tos
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# 火山引擎TOS存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: VOLCENGINE_TOS
                # TOS访问域名（示例：tos-cn-beijing.volces.com）
                endpoint: tos-cn-beijing.volces.com
                # 区域
                region: cn-beijing
                # 访问密钥ID（Access Key ID）
                access-key-id: your-access-key-id
                # 访问密钥（Secret Access Key）
                access-key-secret: your-secret-access-key
                # 存储桶名称
                bucket-name: richie-bucket
                # 桶内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
