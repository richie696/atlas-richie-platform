server:
    port: 8088

spring:
    application:
        name: sample-storage-azure
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# 微软Azure Blob存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: AZURE_BLOB
                # Azure Blob访问域名（示例：https://youraccount.blob.core.windows.net）
                endpoint: https://youraccount.blob.core.windows.net
                # 区域（可选）
                region: eastus
                # 访问密钥ID（Account Name）
                access-key-id: your-account-name
                # 访问密钥（Account Key）
                access-key-secret: your-account-key
                # 容器名称（相当于bucket）
                bucket-name: richie-container
                # 容器内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
