server:
    port: 8082

spring:
    application:
        name: sample-storage-oss
    servlet:
        multipart:
            max-file-size: 100MB
            max-request-size: 100MB

# 阿里云OSS存储配置
platform:
    component:
        storage:
            object:
                # 存储引擎类型
                engine: ALIYUN_OSS
                # OSS访问域名（示例：oss-cn-hangzhou.aliyuncs.com）
                endpoint: oss-cn-hangzhou.aliyuncs.com
                # 区域
                region: cn-hangzhou
                # 访问密钥ID
                access-key-id: your-access-key-id
                # 访问密钥
                access-key-secret: your-access-key-secret
                # 存储桶名称
                bucket-name: richie-bucket
                # 桶内基础路径（可选）
                base-path: /storage

logging:
    level:
        com.richie: DEBUG
