MSG_GATEWAY_TIP_1=K\u00E9rj\u00FCk, jelentkezzen be a folytat\u00E1s el\u0151tt.
MSG_GATEWAY_TIP_2=A bejelentkez\u00E9s m\u00E1r nem \u00E9rv\u00E9nyes, k\u00E9rj\u00FCk jelentkezzen be \u00FAjra.
MSG_GATEWAY_TIP_3=A bejelentkez\u00E9s lej\u00E1rt, k\u00E9rj\u00FCk jelentkezzen be \u00FAjra.
MSG_GATEWAY_TIP_4=Az aktu\u00E1lis fi\u00F3k lej\u00E1rt, k\u00E9rj\u00FCk l\u00E9pjen kapcsolatba a rendszergazd\u00E1val.
MSG_GATEWAY_TIP_5=A b\u00E9rl\u0151 lej\u00E1rati \u00E9rtes\u00EDt\u00E9s k\u00FCld\u00E9se sikertelen volt, k\u00E9rj\u00FCk pr\u00F3b\u00E1lja \u00FAjra k\u00E9s\u0151bb.
MSG_GATEWAY_TIP_6=A b\u00E9rl\u0151 inform\u00E1ci\u00F3 \u00E9rv\u00E9nytelen, k\u00E9rj\u00FCk l\u00E9pjen kapcsolatba a rendszergazd\u00E1val.
MSG_GATEWAY_TIP_7=SSO hiteles\u00EDt\u00E9s sikertelen, k\u00E9rj\u00FCk pr\u00F3b\u00E1lja \u00FAjra.
MSG_GATEWAY_TIP_8=Az aktu\u00E1lis fi\u00F3k m\u00E1shol van bejelentkezve, k\u00E9rj\u00FCk jelentkezzen be \u00FAjra.
