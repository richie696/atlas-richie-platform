# K8s Canary Deployment Example
#
# Usage:
# 1. Stable and canary versions use separate Deployments
# 2. Nacos metadata distinguishes canary and stable instances
# 3. Gateway routes traffic automatically based on metadata

---
# Stable Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-stable
  namespace: production
  labels:
    app: order-service
    version: stable
spec:
  replicas: 3  # Number of stable instances
  selector:
    matchLabels:
      app: order-service
      version: stable
  template:
    metadata:
      labels:
        app: order-service
        version: stable
    spec:
      containers:
      - name: order-service
        image: registry.example.com/order-service:v1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        # Application name (must match Service name)
        - name: SPRING_APPLICATION_NAME
          value: "order-service"
        # Nacos discovery configuration
        - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
          value: "nacos-server:8848"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE
          value: "production"
        # Key: Nacos metadata for stable instances
        - name: SPRING_CLOUD_NACOS_DISCOVERY_METADATA_CANARY
          value: "false"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_METADATA_CANARY_CATEGORY
          value: "CUSTOM"
        # Resource limits
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        # Health checks
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5

---
# Canary Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service-canary
  namespace: production
  labels:
    app: order-service
    version: canary
spec:
  replicas: 1  # Number of canary instances (usually small)
  selector:
    matchLabels:
      app: order-service
      version: canary
  template:
    metadata:
      labels:
        app: order-service
        version: canary
    spec:
      containers:
      - name: order-service
        image: registry.example.com/order-service:v1.1.0  # New version
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        # Application name (must match Service name)
        - name: SPRING_APPLICATION_NAME
          value: "order-service"
        # Nacos discovery configuration
        - name: SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR
          value: "nacos-server:8848"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE
          value: "production"
        # Key: Nacos metadata for canary instances
        - name: SPRING_CLOUD_NACOS_DISCOVERY_METADATA_CANARY
          value: "true"
        - name: SPRING_CLOUD_NACOS_DISCOVERY_METADATA_CANARY_CATEGORY
          value: "ID"
        # Resource limits (canary instances can have smaller resources)
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Health checks
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5

---
# Service (unified service discovery)
# Note: selector only matches app=order-service, not version
# This selects both stable and canary Pods
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: production
  labels:
    app: order-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: order-service  # Selects both stable and canary Pods
    # Note: does not include version label

---
# Optional: HorizontalPodAutoscaler
# Can configure separate HPAs for stable and canary versions
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-stable-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service-stable
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# Optional: HPA for canary (usually set smaller maxReplicas)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: order-service-canary-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-service-canary
  minReplicas: 1
  maxReplicas: 3  # Canary version usually has fewer replicas
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
